baseURL = "https://rackmyself.com"
languageCode = "en-us"
title = "Rack Myself"
theme = "PaperMod"
enableRobotsTXT = true

[pagination]
  pagerSize = 10

[params]
  description = "Practical homelab and self-hosting guides for real people"
  author = "Rack Myself"
  ShowReadingTime = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowShareButtons = false
  ShowFullTextinRSS = true
  disableThemeToggle = false
  defaultTheme = "auto"
  DateFormat = "January 2, 2006"
  mainSections = ["posts"]

  [params.homeInfoParams]
    Title = "Homelab guides that actually work."
    Content = """
**Rack Myself** covers self-hosting, local AI, networking, and home server hardware — written for people who want to get things running, not just understand them in theory.

No fluff. Real commands. Honest recommendations.
"""

  [params.assets]
    favicon = "/favicon.ico"
    favicon16x16 = "/favicon-16x16.png"
    favicon32x32 = "/favicon-32x32.png"

[menu]
  [[menu.main]]
    name = "Guides"
    url = "/posts/"
    weight = 1
  [[menu.main]]
    name = "Search"
    url = "/search/"
    weight = 2
  [[menu.main]]
    name = "About"
    url = "/about/"
    weight = 3

[outputs]
  home = ["HTML", "RSS", "JSON"]
